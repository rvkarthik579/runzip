<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cool Project</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: system-ui; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: grid; place-items: center; color: #fff; }
    .card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; text-align: center; max-width: 500px; }
    h1 { font-size: 2.5rem; margin-bottom: 12px; }
    p { opacity: 0.9; line-height: 1.6; }
    .btn { margin-top: 20px; padding: 12px 28px; border: 2px solid #fff; background: transparent; color: #fff; border-radius: 12px; font-size: 16px; cursor: pointer; }
    .btn:hover { background: #fff; color: #764ba2; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World! 🚀</h1>
    <p>This is a sample project hosted with RunZip. Uploaded as a ZIP file and instantly available with a shareable link.</p>
    <button class="btn" onclick="alert('RunZip is awesome!')">Click Me</button>
  </div>
</body>
</html>
